name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/checkout@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Jar
      run: ./gradlew clean build

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest \
          --load .
      
    - name: Push Image to Docker Hub
      run: |
        docker push \
        ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest

    - name: SSH and Delploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-demo || true
          delete rm spring-demo || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
          docker run -d --name spring-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
